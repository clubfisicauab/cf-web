<style>
  .breakout-container {
    width: 100vw;
    position: relative;
    left: 50%;
    top: -7vh;
    right: 50%;
    margin-left: -50vw;
    margin-right: -50vw;
    padding: 4rem 2rem;
    margin-bottom: -5vh;
    box-sizing: border-box;
  }

  .graella-limitada {
    max-width: 1400px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3rem;
  }

  @media (max-width: 1024px) { .graella-limitada { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 700px) { .graella-limitada { grid-template-columns: 1fr; } }

  .targeta-blog-home {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 24px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100%;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .targeta-blog-home:hover { transform: translateY(-8px); box-shadow: 0 20px 30px rgba(0,0,0,0.1); }

  /* Marge interior forçat */
  .contingut-targeta {
    padding: 2.5rem !important;
    display: flex;
    flex-direction: column;
    flex-grow: 1;
  }

  /* Text justificat forçat */
  .resum-blog {
    text-align: justify !important;
    margin-bottom: 2rem !important;
    line-height: 1.6;
    color: #4b5563;
  }

  /* Boto estilitzat forçat */
  .boto-llegir {
    display: inline-block;
    padding: 0.75rem 1.5rem !important;
    border: 2px solid #111827 !important;
    border-radius: 12px !important;
    color: #111827 !important;
    font-weight: 600;
    text-decoration: none !important;
    transition: all 0.2s;
  }
  .boto-llegir:hover { background: #111827 !important; color: white !important; }
</style>

<div class="breakout-container">
  <div class="graella-limitada">
    {{ range first 3 (where site.RegularPages "Section" "blog") }}
    <article class="targeta-blog-home">
      {{ if .Params.image }}
      <div class="w-full h-80 overflow-hidden">
        <a href="{{ .RelPermalink }}">
          <img src="{{ .Params.image }}" alt="{{ .Title }}" style="width: 100%; height: 100%; object-fit: cover;">
        </a>
      </div>
      {{ end }}
      
      <div class="contingut-targeta">
        <h3 class="text-2xl font-extrabold mb-4 leading-tight text-gray-900">{{ .Title }}</h3>
        <time class="text-sm text-gray-500 mb-6 block font-medium">{{ .Date.Format "02/01/2006" }}</time>
        
        <p class="resum-blog">
          {{ .Summary | plainify | truncate 180 }}
        </p>
        
        <div class="mt-auto">
          <a href="{{ .RelPermalink }}" class="boto-llegir">Llegir més</a>
        </div>
      </div>
    </article>
    {{ end }}
  </div>
</div>
